<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Catcher Game</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        /* Fixed Navigation Button Styling */
        .nav-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 99999; /* Forces the button to stay on top of all canvas layers */
        }

        .back-scratch-btn {
            display: inline-block;
            padding: 10px 18px;
            background-color: #0f4c81; /* Matches your canvas border accent color */
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            border-radius: 6px;
            border: 2px solid #00fff0; /* Bright arcade cyan accent glow */
            box-shadow: 0 0 10px rgba(0, 255, 240, 0.3);
            transition: all 0.2s ease;
        }

        .back-scratch-btn:hover {
            background-color: #00fff0;
            color: #1a1a2e;
            box-shadow: 0 0 15px rgba(0, 255, 240, 0.7);
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00fff0;
        }

        #scoreboard {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* The game window screen */
        canvas {
            background: #162447;
            border: 4px solid #0f4c81;
            box-shadow: 0 0 20px rgba(15, 76, 129, 0.6);
            border-radius: 8px;
            cursor: none; /* Hides the mouse cursor over the game */
        }

        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #848ccf;
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="scratch.html" class="back-scratch-btn">⬅️ Exit to Project</a>
    </div>

    <h1>CATCH THE STAR!</h1>
    <div id="scoreboard">Score: <span id="scoreValue">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <div class="instructions">Move your mouse left and right to catch the falling stars!</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("scoreValue");

        // Game Variable States
        let score = 0;
        let gameOver = false;

        // Player (The Basket) Object
        const player = {
            x: canvas.width / 2 - 35,
            y: canvas.height - 30,
            width: 70,
            height: 15,
            color: "#00fff0"
        };

        // Falling Item (The Star) Object
        const item = {
            x: Math.random() * (canvas.width - 20),
            y: 0,
            size: 15,
            speed: 4,
            color: "#ffdf00"
        };

        // Track Mouse Movement to move the Player basket
        window.addEventListener("mousemove", (e) => {
            // Calculate mouse position relative to the canvas box
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            
            // Keep the basket inside the canvas screen boundaries
            if (mouseX >= player.width / 2 && mouseX <= canvas.width - player.width / 2) {
                player.x = mouseX - player.width / 2;
            }
        });

        // The Main Game Loop (Updates positions and draws graphics continuously)
        function gameLoop() {
            if (gameOver) return;

            // 1. CLEAR THE SCREEN
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. MOVE THE FALLING STAR
            item.y += item.speed;

            // 3. CHECK FOR COLLISION (Did the basket catch the star?)
            if (
                item.y + item.size >= player.y &&
                item.x + item.size >= player.x &&
                item.x <= player.x + player.width
            ) {
                score += 1;
                scoreDisplay.textContent = score;
                resetItem();
                
                // Gradually increase speed as the player gets better
                if (score % 5 === 0) {
                    item.speed += 0.75;
                }
            }

            // 4. CHECK FOR MISS (Did the star hit the floor?)
            if (item.y > canvas.height) {
                handleGameOver();
                return;
            }

            // 5. DRAW THE PLAYER (Basket)
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.roundRect(player.x, player.y, player.width, player.height, 5);
            ctx.fill();

            // 6. DRAW THE FALLING ITEM (Star)
            ctx.fillStyle = item.color;
            ctx.beginPath();
            ctx.arc(item.x + item.size/2, item.y + item.size/2, item.size, 0, Math.PI * 2);
            ctx.fill();

            // Run this function again on the next animation frame
            requestAnimationFrame(gameLoop);
        }

        // Helper function to drop a new star from the top
        function resetItem() {
            item.x = Math.random() * (canvas.width - item.size);
            item.y = 0;
        }

        // Trigger Game Over Screen
        function handleGameOver() {
            gameOver = true;
            ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ff007f";
            ctx.font = "bold 30px Arial";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
            
            ctx.fillStyle = "#ffffff";
            ctx.font = "16px Arial";
            ctx.fillText("Refresh the page to play again!", canvas.width / 2, canvas.height / 2 + 40);
        }

        // Start the game loop automatically when the page loads
        gameLoop();
    </script>
    <script>
    // AUTOMATIC FOCUS FIX: Clicking anywhere inside the game immediately forces the browser
    // to direct all keyboard inputs (arrows, spacebar, WASD) into the game logic.
    window.addEventListener("mousedown", function() {
        window.focus();
    });

    // OPTIONAL: Stops the arrow keys and spacebar from scrolling the main browser page 
    // while someone is actively trying to play your game.
    window.addEventListener("keydown", function(e) {
        if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1) {
            e.preventDefault();
        }
    }, {passive: false});
    
</script>
</body>
</html>
